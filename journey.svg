<svg width="780" height="200" viewBox="0 0 780 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="200" fill="#0d1117" rx="12" stroke="#21262d" stroke-width="1"/>
  <text x="390" y="28" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#8b949e" letter-spacing="3">CAREER TIMELINE</text>
  <!-- Timeline line -->
  <line x1="60" y1="100" x2="720" y2="100" stroke="#21262d" stroke-width="2"/>
  <!-- Progress fill -->
  <line x1="60" y1="100" x2="720" y2="100" stroke="#00FFB3" stroke-width="2" opacity="0.3" stroke-dasharray="5,3"/>

  <!-- Node 1: 2017 Started -->
  <circle cx="120" cy="100" r="8" fill="#00FFB3" stroke="#0d1117" stroke-width="2"/>
  <line x1="120" y1="92" x2="120" y2="55" stroke="#00FFB3" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="120" y="48" text-anchor="middle" font-family="'Courier New'" font-size="11" fill="#00FFB3">2017</text>
  <text x="120" y="36" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">Started</text>
  <text x="120" y="26" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">Coding</text>

  <!-- Node 2: 2018 First App -->
  <circle cx="270" cy="100" r="8" fill="#00c9ff" stroke="#0d1117" stroke-width="2"/>
  <line x1="270" y1="108" x2="270" y2="148" stroke="#00c9ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="270" y="162" text-anchor="middle" font-family="'Courier New'" font-size="11" fill="#00c9ff">2018</text>
  <text x="270" y="174" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">First Full</text>
  <text x="270" y="184" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">Stack App</text>

  <!-- Node 3: 2019 SIH (gold, bigger) -->
  <circle cx="390" cy="100" r="12" fill="#FFD700" stroke="#0d1117" stroke-width="2"/>
  <text x="390" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#0d1117" font-weight="bold">&#127942;</text>
  <line x1="390" y1="88" x2="390" y2="48" stroke="#FFD700" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="390" y="42" text-anchor="middle" font-family="'Courier New'" font-size="11" fill="#FFD700">2019</text>
  <text x="390" y="30" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">SIH Grand</text>
  <text x="390" y="20" text-anchor="middle" font-family="Arial" font-size="9" fill="#FFD700">Finalist &#127942;</text>

  <!-- Node 4: 2021 GirlScript -->
  <circle cx="530" cy="100" r="8" fill="#00FFB3" stroke="#0d1117" stroke-width="2"/>
  <line x1="530" y1="108" x2="530" y2="148" stroke="#00FFB3" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="530" y="162" text-anchor="middle" font-family="'Courier New'" font-size="11" fill="#00FFB3">2021</text>
  <text x="530" y="174" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">GirlScript</text>
  <text x="530" y="184" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">Project Lead</text>

  <!-- Node 5: NOW (pulsing) -->
  <circle cx="670" cy="100" r="10" fill="#00FFB3" stroke="#00FFB3" stroke-width="0">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="670" cy="100" r="6" fill="#0d1117"/>
  <circle cx="670" cy="100" r="3" fill="#00FFB3"/>
  <line x1="670" y1="90" x2="670" y2="50" stroke="#00FFB3" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="670" y="44" text-anchor="middle" font-family="'Courier New'" font-size="11" fill="#00FFB3">NOW</text>
  <text x="670" y="32" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">Web3 &amp;</text>
  <text x="670" y="22" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b949e">Cloud &#128640;</text>
</svg>
