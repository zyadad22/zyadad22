<svg width="780" height="120" viewBox="0 0 780 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="120" fill="#0d1117" rx="10" stroke="#21262d" stroke-width="1"/>

  <!-- Grid dots -->
  <g opacity="0.12" fill="#00FFB3">
    <circle cx="20" cy="20" r="2"/><circle cx="60" cy="20" r="2"/><circle cx="100" cy="20" r="2"/>
    <circle cx="140" cy="20" r="2"/><circle cx="180" cy="20" r="2"/><circle cx="220" cy="20" r="2"/>
    <circle cx="260" cy="20" r="2"/><circle cx="300" cy="20" r="2"/><circle cx="340" cy="20" r="2"/>
    <circle cx="380" cy="20" r="2"/><circle cx="420" cy="20" r="2"/><circle cx="460" cy="20" r="2"/>
    <circle cx="500" cy="20" r="2"/><circle cx="540" cy="20" r="2"/><circle cx="580" cy="20" r="2"/>
    <circle cx="620" cy="20" r="2"/><circle cx="660" cy="20" r="2"/><circle cx="700" cy="20" r="2"/>
    <circle cx="740" cy="20" r="2"/><circle cx="760" cy="20" r="2"/>
    <circle cx="20" cy="60" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="100" cy="60" r="2"/>
    <circle cx="140" cy="60" r="2"/><circle cx="180" cy="60" r="2"/><circle cx="220" cy="60" r="2"/>
    <circle cx="260" cy="60" r="2"/><circle cx="300" cy="60" r="2"/><circle cx="340" cy="60" r="2"/>
    <circle cx="380" cy="60" r="2"/><circle cx="420" cy="60" r="2"/><circle cx="460" cy="60" r="2"/>
    <circle cx="500" cy="60" r="2"/><circle cx="540" cy="60" r="2"/><circle cx="580" cy="60" r="2"/>
    <circle cx="620" cy="60" r="2"/><circle cx="660" cy="60" r="2"/><circle cx="700" cy="60" r="2"/>
    <circle cx="740" cy="60" r="2"/>
    <circle cx="20" cy="100" r="2"/><circle cx="60" cy="100" r="2"/><circle cx="100" cy="100" r="2"/>
    <circle cx="140" cy="100" r="2"/><circle cx="180" cy="100" r="2"/><circle cx="220" cy="100" r="2"/>
    <circle cx="260" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="340" cy="100" r="2"/>
    <circle cx="380" cy="100" r="2"/><circle cx="420" cy="100" r="2"/><circle cx="460" cy="100" r="2"/>
    <circle cx="500" cy="100" r="2"/><circle cx="540" cy="100" r="2"/><circle cx="580" cy="100" r="2"/>
    <circle cx="620" cy="100" r="2"/><circle cx="660" cy="100" r="2"/><circle cx="700" cy="100" r="2"/>
    <circle cx="740" cy="100" r="2"/>
  </g>

  <!-- Snake body - fading tail to bright head -->
  <rect x="16" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.1"/>
  <rect x="36" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.2"/>
  <rect x="56" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.3"/>
  <rect x="76" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.4"/>
  <rect x="96" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.5"/>
  <rect x="116" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.6"/>
  <!-- Turn up -->
  <rect x="116" y="36" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.65"/>
  <rect x="116" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.7"/>
  <!-- Go right -->
  <rect x="136" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.73"/>
  <rect x="156" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.76"/>
  <rect x="176" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.79"/>
  <rect x="196" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.82"/>
  <rect x="216" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.85"/>
  <!-- Turn down -->
  <rect x="236" y="16" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.87"/>
  <rect x="236" y="36" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.89"/>
  <rect x="236" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.91"/>
  <rect x="236" y="76" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.93"/>
  <rect x="236" y="96" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.95"/>
  <!-- Go right bottom -->
  <rect x="256" y="96" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.96"/>
  <rect x="276" y="96" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.97"/>
  <rect x="296" y="96" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.98"/>
  <rect x="316" y="96" width="12" height="12" rx="3" fill="#00FFB3" opacity="0.99"/>
  <!-- Turn up again -->
  <rect x="336" y="96" width="12" height="12" rx="3" fill="#00FFB3" opacity="1"/>
  <rect x="336" y="76" width="12" height="12" rx="3" fill="#00FFB3" opacity="1"/>
  <rect x="336" y="56" width="12" height="12" rx="3" fill="#00FFB3" opacity="1"/>
  <rect x="336" y="36" width="12" height="12" rx="3" fill="#00FFB3" opacity="1"/>

  <!-- Head -->
  <rect x="336" y="16" width="14" height="14" rx="4" fill="#00FFB3"/>
  <circle cx="340" cy="21" r="2.5" fill="#0d1117"/>
  <circle cx="347" cy="21" r="2.5" fill="#0d1117"/>
  <!-- Tongue -->
  <line x1="343" y1="16" x2="340" y2="10" stroke="#ff4444" stroke-width="1.5"/>
  <line x1="343" y1="16" x2="346" y2="10" stroke="#ff4444" stroke-width="1.5"/>

  <!-- Head glow pulse -->
  <rect x="334" y="14" width="18" height="18" rx="5" fill="none" stroke="#00FFB3" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2;3;2" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Apple / Food -->
  <circle cx="500" cy="62" r="9" fill="#ff4444">
    <animate attributeName="r" values="9;11;9" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="62" r="9" fill="none" stroke="#ff6666" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="9;15;9" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <line x1="500" y1="53" x2="503" y2="47" stroke="#4ade80" stroke-width="2"/>

  <!-- Label right side -->
  <text x="580" y="50" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">Eating commits</text>
  <text x="580" y="70" font-family="'Courier New', monospace" font-size="12" fill="#00FFB3">one by one &#128013;</text>
  <text x="580" y="90" font-family="'Courier New', monospace" font-size="10" fill="#21262d">968 total</text>
</svg>
